kind = "web"
previewPath = "/"
title = "PitchMind AI"
version = "1.0.0"
id = "artifacts/pitchmind"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18613

[services.development]
run = "pnpm --filter @workspace/pitchmind run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pitchmind", "run", "build" ]
publicDir = "artifacts/pitchmind/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18613"
BASE_PATH = "/"
